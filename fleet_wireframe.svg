<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" width="100%" height="100%" style="background-color: #1a1a24; font-family: system-ui, -apple-system, sans-serif;">
  <!-- Grid Background (Subtle) -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2d2d3d" stroke-width="1"/>
    </pattern>
  </defs>
  
  <rect width="100%" height="100%" fill="#12121a" />
  <rect width="100%" height="100%" fill="url(#grid)" opacity="0.7"/>

  <!-- ==================== HEADER ==================== -->
  <g id="header-section" transform="translate(0, 0)">
    <!-- Header Container -->
    <rect x="40" y="20" width="1120" height="70" rx="8" fill="#1e1e2d" stroke="#3d3d5c" stroke-width="2" />
    <!-- Logo -->
    <rect x="70" y="40" width="150" height="30" rx="4" fill="#2d2d42" stroke="#5d5d7e" stroke-width="1.5" />
    <text x="145" y="60" fill="#a0a0c0" font-size="14" font-weight="600" text-anchor="middle">AeroLux Logo</text>
    
    <!-- Navigation Links -->
    <g transform="translate(420, 0)">
      <text x="0" y="60" fill="#a0a0c0" font-size="14">Home</text>
      
      <text x="80" y="60" fill="#00e676" font-size="14" font-weight="600">Fleet</text>
      <line x1="80" y1="68" x2="114" y2="68" stroke="#00e676" stroke-width="2" />
      
      <text x="160" y="60" fill="#a0a0c0" font-size="14">Technology</text>
      <text x="270" y="60" fill="#a0a0c0" font-size="14">Safety</text>
      <text x="350" y="60" fill="#a0a0c0" font-size="14">Company</text>
    </g>

    <!-- Header CTA Button -->
    <rect x="980" y="35" width="150" height="40" rx="20" fill="#00e676" opacity="0.15" stroke="#00e676" stroke-width="2" />
    <text x="1055" y="60" fill="#00e676" font-size="14" font-weight="bold" text-anchor="middle">Book Flight</text>
  </g>

  <!-- ==================== SUBPAGE TITLE & BREADCRUMBS ==================== -->
  <g id="subpage-title" transform="translate(0, 110)">
    <!-- Breadcrumbs -->
    <text x="40" y="30" fill="#a0a0c0" font-size="13">Home &gt; Fleet &gt; Our Aircraft</text>
    
    <!-- Title -->
    <text x="40" y="80" fill="#ffffff" font-size="36" font-weight="bold">The AeroLux Fleet</text>
    <rect x="40" y="95" width="120" height="4" rx="2" fill="#00e676" />
    
    <!-- Brief Subtitle -->
    <text x="40" y="125" fill="#a0a0c0" font-size="16">Discover our range of custom-engineered eVTOL passenger aircraft designed for modern urban environments.</text>
  </g>

  <!-- ==================== FILTER & SEARCH BAR ==================== -->
  <g id="filter-bar" transform="translate(0, 260)">
    <rect x="40" y="0" width="1120" height="80" rx="8" fill="#1e1e2d" stroke="#3d3d5c" stroke-width="2" />
    
    <!-- Filter: Aircraft Class -->
    <text x="70" y="30" fill="#a0a0c0" font-size="12">AIRCRAFT CLASS</text>
    <rect x="70" y="38" width="200" height="32" rx="4" fill="#12121a" stroke="#3d3d5c" stroke-width="1.5" />
    <text x="85" y="58" fill="#ffffff" font-size="13">All Classes</text>
    <path d="M 245 51 L 250 56 L 255 51" fill="none" stroke="#a0a0c0" stroke-width="2" />

    <!-- Filter: Capacity -->
    <text x="290" y="30" fill="#a0a0c0" font-size="12">CAPACITY (PASSENGERS)</text>
    <rect x="290" y="38" width="180" height="32" rx="4" fill="#12121a" stroke="#3d3d5c" stroke-width="1.5" />
    <text x="305" y="58" fill="#ffffff" font-size="13">2 - 6 Passengers</text>
    <path d="M 445 51 L 450 56 L 455 51" fill="none" stroke="#a0a0c0" stroke-width="2" />

    <!-- Filter: Range Slider Placeholder -->
    <text x="500" y="30" fill="#a0a0c0" font-size="12">MINIMUM RANGE (MILES)</text>
    <!-- Range Line & Node -->
    <line x1="500" y1="54" x2="750" y2="54" stroke="#2d2d42" stroke-width="6" stroke-linecap="round" />
    <line x1="500" y1="54" x2="650" y2="54" stroke="#00e676" stroke-width="6" stroke-linecap="round" />
    <circle cx="650" cy="54" r="10" fill="#ffffff" stroke="#00e676" stroke-width="2" />
    <text x="770" y="58" fill="#ffffff" font-size="13">65+ miles</text>

    <!-- Sort Selector -->
    <text x="920" y="30" fill="#a0a0c0" font-size="12">SORT BY</text>
    <rect x="920" y="38" width="200" height="32" rx="4" fill="#12121a" stroke="#3d3d5c" stroke-width="1.5" />
    <text x="935" y="58" fill="#ffffff" font-size="13">Top Rated</text>
    <path d="M 1095 51 L 1100 56 L 1105 51" fill="none" stroke="#a0a0c0" stroke-width="2" />
  </g>

  <!-- ==================== FLEET AIRCRAFT GRID (2 COLUMNS) ==================== -->
  <g id="aircraft-grid" transform="translate(0, 370)">
    <!-- Card 1: AeroLux Voyager -->
    <g transform="translate(40, 0)">
      <rect x="0" y="0" width="540" height="520" rx="12" fill="#1e1e2d" stroke="#3d3d5c" stroke-width="2" />
      <!-- Image Placeholder with X -->
      <rect x="20" y="20" width="500" height="260" rx="8" fill="#12121a" stroke="#2d2d42" stroke-width="1.5" />
      <path d="M 20 20 L 520 280 M 520 20 L 20 280" stroke="#2d2d3d" stroke-width="1" opacity="0.5" />
      <text x="270" y="150" fill="#a0a0c0" font-size="14" text-anchor="middle">[Voyager Image Mockup]</text>
      
      <!-- Label / Category -->
      <rect x="20" y="300" width="100" height="22" rx="4" fill="#00e676" opacity="0.15" />
      <text x="70" y="315" fill="#00e676" font-size="11" font-weight="bold" text-anchor="middle">URBAN EXECUTIVE</text>
      
      <!-- Title -->
      <text x="20" y="355" fill="#ffffff" font-size="24" font-weight="bold">AeroLux Voyager</text>
      
      <!-- Short description lines -->
      <rect x="20" y="375" width="400" height="6" rx="3" fill="#4d4d6e" />
      <rect x="20" y="390" width="350" height="6" rx="3" fill="#4d4d6e" />

      <!-- Specs Horizontal list -->
      <g transform="translate(20, 415)">
        <text x="0" y="15" fill="#a0a0c0" font-size="12">CAPACITY</text>
        <text x="0" y="35" fill="#ffffff" font-size="15" font-weight="bold">4 Passengers</text>

        <text x="160" y="15" fill="#a0a0c0" font-size="12">RANGE</text>
        <text x="160" y="35" fill="#ffffff" font-size="15" font-weight="bold">75 Miles</text>

        <text x="320" y="15" fill="#a0a0c0" font-size="12">CRUISE SPEED</text>
        <text x="320" y="35" fill="#ffffff" font-size="15" font-weight="bold">150 MPH</text>
      </g>

      <!-- Action Buttons -->
      <rect x="20" y="470" width="230" height="40" rx="20" fill="#00e676" />
      <text x="135" y="495" fill="#12121a" font-size="14" font-weight="bold" text-anchor="middle">Configure &amp; Book</text>

      <rect x="290" y="470" width="230" height="40" rx="20" fill="none" stroke="#a0a0c0" stroke-width="1.5" />
      <text x="405" y="495" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">View Specs</text>
    </g>

    <!-- Card 2: AeroLux SkyCruiser -->
    <g transform="translate(620, 0)">
      <rect x="0" y="0" width="540" height="520" rx="12" fill="#1e1e2d" stroke="#3d3d5c" stroke-width="2" />
      <!-- Image Placeholder with X -->
      <rect x="20" y="20" width="500" height="260" rx="8" fill="#12121a" stroke="#2d2d42" stroke-width="1.5" />
      <path d="M 20 20 L 520 280 M 520 20 L 20 280" stroke="#2d2d3d" stroke-width="1" opacity="0.5" />
      <text x="270" y="150" fill="#a0a0c0" font-size="14" text-anchor="middle">[SkyCruiser Image Mockup]</text>
      
      <!-- Label / Category -->
      <rect x="20" y="300" width="100" height="22" rx="4" fill="#00e676" opacity="0.15" />
      <text x="70" y="315" fill="#00e676" font-size="11" font-weight="bold" text-anchor="middle">REGIONAL SHUTTLE</text>
      
      <!-- Title -->
      <text x="20" y="355" fill="#ffffff" font-size="24" font-weight="bold">AeroLux SkyCruiser</text>
      
      <!-- Short description lines -->
      <rect x="20" y="375" width="400" height="6" rx="3" fill="#4d4d6e" />
      <rect x="20" y="390" width="350" height="6" rx="3" fill="#4d4d6e" />

      <!-- Specs Horizontal list -->
      <g transform="translate(20, 415)">
        <text x="0" y="15" fill="#a0a0c0" font-size="12">CAPACITY</text>
        <text x="0" y="35" fill="#ffffff" font-size="15" font-weight="bold">6 Passengers</text>

        <text x="160" y="15" fill="#a0a0c0" font-size="12">RANGE</text>
        <text x="160" y="35" fill="#ffffff" font-size="15" font-weight="bold">120 Miles</text>

        <text x="320" y="15" fill="#a0a0c0" font-size="12">CRUISE SPEED</text>
        <text x="320" y="35" fill="#ffffff" font-size="15" font-weight="bold">180 MPH</text>
      </g>

      <!-- Action Buttons -->
      <rect x="20" y="470" width="230" height="40" rx="20" fill="#00e676" />
      <text x="135" y="495" fill="#12121a" font-size="14" font-weight="bold" text-anchor="middle">Configure &amp; Book</text>

      <rect x="290" y="470" width="230" height="40" rx="20" fill="none" stroke="#a0a0c0" stroke-width="1.5" />
      <text x="405" y="495" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">View Specs</text>
    </g>
  </g>

  <!-- ==================== COMPARE SPECIFICATIONS ==================== -->
  <g id="compare-section" transform="translate(0, 920)">
    <text x="40" y="40" fill="#ffffff" font-size="24" font-weight="bold">Compare Models</text>
    <rect x="40" y="50" width="80" height="4" rx="2" fill="#00e676" />
    
    <!-- Comparison Table container -->
    <rect x="40" y="80" width="1120" height="300" rx="8" fill="#1e1e2d" stroke="#3d3d5c" stroke-width="2" />
    
    <!-- Row Header -->
    <line x1="40" y1="140" x2="1160" y2="140" stroke="#3d3d5c" stroke-width="1.5" />
    <text x="70" y="120" fill="#a0a0c0" font-size="14" font-weight="bold">Specification</text>
    <text x="500" y="120" fill="#00e676" font-size="14" font-weight="bold">AeroLux Voyager</text>
    <text x="850" y="120" fill="#a0a0c0" font-size="14" font-weight="bold">AeroLux SkyCruiser</text>
    
    <!-- Row 1: Propulsion -->
    <line x1="40" y1="200" x2="1160" y2="200" stroke="#3d3d5c" stroke-width="1" />
    <text x="70" y="175" fill="#ffffff" font-size="14">Propulsion System</text>
    <text x="500" y="175" fill="#a0a0c0" font-size="14">8x Coaxial eVTOL Rotors</text>
    <text x="850" y="175" fill="#a0a0c0" font-size="14">Tilt-Rotor Vectored Thrust</text>

    <!-- Row 2: Acoustic Level -->
    <line x1="40" y1="260" x2="1160" y2="260" stroke="#3d3d5c" stroke-width="1" />
    <text x="70" y="235" fill="#ffffff" font-size="14">Flyover Noise Level</text>
    <text x="500" y="235" fill="#a0a0c0" font-size="14">55 dBA at 500 ft</text>
    <text x="850" y="235" fill="#a0a0c0" font-size="14">62 dBA at 500 ft</text>

    <!-- Row 3: Luggage Capacity -->
    <text x="70" y="295" fill="#ffffff" font-size="14">Luggage Weight Cap</text>
    <text x="500" y="295" fill="#a0a0c0" font-size="14">Up to 40 lbs per person</text>
    <text x="850" y="295" fill="#a0a0c0" font-size="14">Up to 60 lbs per person</text>
  </g>

  <!-- ==================== FOOTER ==================== -->
  <g id="footer-section" transform="translate(0, 1440)">
    <!-- Footer line separator -->
    <line x1="40" y1="0" x2="1160" y2="0" stroke="#2d2d3d" stroke-width="2" />
    
    <!-- Footer Links Column 1 -->
    <g transform="translate(60, 40)">
      <rect x="0" y="0" width="120" height="24" rx="4" fill="#2d2d42" />
      <text x="10" y="16" fill="#00e676" font-size="12" font-weight="bold">AEROLUX</text>
      
      <text x="0" y="60" fill="#a0a0c0" font-size="12">© 2026 AeroLux Inc.</text>
      <text x="0" y="80" fill="#a0a0c0" font-size="12">All rights reserved.</text>
    </g>

    <!-- Footer Links Column 2 -->
    <g transform="translate(300, 40)">
      <text x="0" y="20" fill="#ffffff" font-size="14" font-weight="bold">Company</text>
      <text x="0" y="50" fill="#a0a0c0" font-size="12">About Us</text>
      <text x="0" y="70" fill="#a0a0c0" font-size="12">Careers</text>
      <text x="0" y="90" fill="#a0a0c0" font-size="12">Press Kit</text>
    </g>

    <!-- Footer Links Column 3 -->
    <g transform="translate(500, 40)">
      <text x="0" y="20" fill="#ffffff" font-size="14" font-weight="bold">Technology</text>
      <text x="0" y="50" fill="#a0a0c0" font-size="12">eVTOL Aircraft</text>
      <text x="0" y="70" fill="#a0a0c0" font-size="12">Safety Systems</text>
      <text x="0" y="90" fill="#a0a0c0" font-size="12">Sustainability</text>
    </g>

    <!-- Footer Links Column 4 (Newsletter) -->
    <g transform="translate(750, 40)">
      <text x="0" y="20" fill="#ffffff" font-size="14" font-weight="bold">Stay Updated</text>
      <rect x="0" y="40" width="240" height="35" rx="4" fill="#1e1e2d" stroke="#3d3d5c" stroke-width="1" />
      <text x="15" y="62" fill="#4d4d6e" font-size="12">Enter email address...</text>
      
      <rect x="250" y="40" width="100" height="35" rx="4" fill="#00e676" />
      <text x="300" y="62" fill="#12121a" font-size="12" font-weight="bold" text-anchor="middle">Subscribe</text>
    </g>
  </g>

  <!-- ==================== ANNOTATION NODE MARKERS (7 to 12) ==================== -->
  <g id="annotation-markers">
    <!-- 7. Breadcrumbs -->
    <circle cx="28" cy="140" r="14" fill="#00e676" stroke="#ffffff" stroke-width="2" />
    <text x="28" y="145" fill="#12121a" font-size="14" font-weight="bold" text-anchor="middle">7</text>
    
    <!-- 8. Filters Header controls -->
    <circle cx="890" cy="298" r="14" fill="#00e676" stroke="#ffffff" stroke-width="2" />
    <text x="890" y="303" fill="#12121a" font-size="14" font-weight="bold" text-anchor="middle">8</text>
    
    <!-- 9. Drone Image Card & Labeling -->
    <circle cx="560" cy="400" r="14" fill="#00e676" stroke="#ffffff" stroke-width="2" />
    <text x="560" y="405" fill="#12121a" font-size="14" font-weight="bold" text-anchor="middle">9</text>

    <!-- 10. Specifications breakdown and metadata -->
    <circle cx="340" cy="800" r="14" fill="#00e676" stroke="#ffffff" stroke-width="2" />
    <text x="340" y="805" fill="#12121a" font-size="14" font-weight="bold" text-anchor="middle">10</text>

    <!-- 11. Customizer Configuration widget CTA -->
    <circle cx="270" cy="840" r="14" fill="#00e676" stroke="#ffffff" stroke-width="2" />
    <text x="270" y="845" fill="#12121a" font-size="14" font-weight="bold" text-anchor="middle">11</text>

    <!-- 12. Comparison grid table -->
    <circle cx="1145" cy="1000" r="14" fill="#00e676" stroke="#ffffff" stroke-width="2" />
    <text x="1145" y="1005" fill="#12121a" font-size="14" font-weight="bold" text-anchor="middle">12</text>
  </g>
</svg>
